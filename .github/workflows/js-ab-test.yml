name: "JS A/B: userEvent.type flaky test"

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  # A: current code (convenience API: userEvent.type)
  test-a-convenience-api:
    permissions:
      contents: read
    timeout-minutes: 15
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mlflow/server/js
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-node
      - name: Install dependencies
        run: yarn install --immutable
      - name: "Run A (convenience API) x100"
        run: |
          for i in $(seq 1 100); do
            echo "=== Attempt $i ==="
            yarn test --verbose --testPathPattern='CreateBudgetPolicyModal\.test\.tsx$' || echo "FAILED on attempt $i"
          done

  # B: userEvent.setup() API
  test-b-setup-api:
    permissions:
      contents: read
    timeout-minutes: 15
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mlflow/server/js
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-node
      - name: Install dependencies
        run: yarn install --immutable
      - name: "Run B (setup API) x100"
        run: |
          for i in $(seq 1 100); do
            echo "=== Attempt $i ==="
            yarn test --verbose --testPathPattern='CreateBudgetPolicyModal\.setup\.test' || echo "FAILED on attempt $i"
          done
